workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "webide"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "testing"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - if: '$CI_COMMIT_TAG'


variables:
  COATJAVA_REF_NAME: main
  KUBERNETES_MEMORY_LIMIT: "8Gi"
  #RUN_NUMBER: 20777
  LOCAL_DATA_DIR: "/scratch/${CI_PROJECT_NAME}_${CI_PIPELINE_ID}"
  NEVENTS: 1000

default:
  image: ubuntu:noble
  tags:
    - silicon-cached
  artifacts:
    when: always
    paths:
      - results
    expire_in: 1 week

clas12_database:
  image: codecr.jlab.org/hallb/alert/coatjava/coatjava:$COATJAVA_REF_NAME
  tags:
    - silicon-cached
  script:
    - mkdir ${LOCAL_DATA_DIR}
    - ( [ -f "ccdb.sqlite" ] || wget -q https://clasweb.jlab.org/clas12offline/sqlite/ccdb/latest.sqlite -O ccdb.sqlite )
    #- ( [ -f "ccdb.sqlite" ] || wget -q https://userweb.jlab.org/~whit/data_files/ccdb.sqlite -O ccdb.sqlite )
    #- ( [ -f "rcdb.sqlite" ] || wget -q https://clasweb.jlab.org/clas12offline/sqlite/rcdb/latest.sqlite -O rcdb.sqlite )
    - ( [ -f "rcdb.sqlite" ] || wget -q https://userweb.jlab.org/~whit/data_files/rcdb.sqlite -O rcdb.sqlite )
  cache:
    - key: clas12testing
      paths:
        - ccdb.sqlite
        - rcdb.sqlite

alert_decode:
  image: codecr.jlab.org/hallb/alert/coatjava/coatjava:$COATJAVA_REF_NAME
  tags:
    - silicon-cached
  needs: ["clas12_database"]
  script:
    - ls -lrth 
      # not sure if this is still needed...
    - apt install  -y python3-sqlalchemy
    - git clone --depth=1 https://github.com/JeffersonLab/ccdb.git
    - source ccdb/environment.bash
    - ls -lrth 
    - ls -lrth /opt/coatjava
    - ls -lrth  ${LOCAL_DATA_DIR}
    - ( [ -f "ccdb.sqlite" ] || wget -q https://clasweb.jlab.org/clas12offline/sqlite/ccdb/latest.sqlite -O ccdb.sqlite )
    #- ( [ -f "ccdb.sqlite" ] || wget -q https://userweb.jlab.org/~whit/data_files/ccdb.sqlite -O ccdb.sqlite )
    #- ( [ -f "rcdb.sqlite" ] || wget -q https://clasweb.jlab.org/clas12offline/sqlite/rcdb/latest.sqlite -O rcdb.sqlite )
    - ( [ -f "rcdb.sqlite" ] || wget -q https://userweb.jlab.org/~whit/data_files/rcdb.sqlite -O rcdb.sqlite )
    - export PATH=/opt/coatjava/coatjava/bin:$PATH
    - source /opt/coatjava/coatjava/libexec/env.sh
    - ls -lrth
    - printenv
    - echo "RUN_NUMBER = ${RUN_NUMBER}" 
    - echo "CLAS12DIR = ${CLAS12DIR}" 
    - export CCDB_CONNECTION="sqlite:///${PWD}/ccdb.sqlite"
    - export RCDB_CONNECTION="sqlite:///${PWD}/rcdb.sqlite"
    - echo "CCDB_CONNECTION = ${CCDB_CONNECTION}" 
    - echo "RCDB_CONNECTION = ${RCDB_CONNECTION}" 
      #- ccdb dump /daq/tt/atof2::default
    - decoder -help || true
    - decoder -n ${NEVENTS} -o ${LOCAL_DATA_DIR}/alert_${RUN_NUMBER}.hipo  /globus/clas_0${RUN_NUMBER}/clas_*.evio.*
    - ls -lrth
  cache:
    - key: clas12testing
      paths:
        - ccdb.sqlite
        - rcdb.sqlite
      policy: pull
  parallel:
    matrix:
      - RUN_NUMBER: [
                    #"20770","20777","20781","20821","20822","20823","20825", "20904",
                    # "21003", "21004",
                     #"21005","21009","21011","21019","21023",
                     #"21023", "21274"
                     "22188"
                    ]
reconstruction:
  image: codecr.jlab.org/hallb/alert/coatjava/coatjava:$COATJAVA_REF_NAME
  needs: 
    - job: "alert_decode"
  cache:
    - key: clas12testing
      paths:
        - ccdb.sqlite
        - rcdb.sqlite
      policy: pull
  tags:
    - silicon-cached
  before_script:
    - ( [ -f "ccdb.sqlite" ] || wget -q https://clasweb.jlab.org/clas12offline/sqlite/ccdb/latest.sqlite -O ccdb.sqlite )
    #- ( [  -f "ccdb.sqlite" ] || wget -q https://userweb.jlab.org/~whit/data_files/ccdb.sqlite -O ccdb.sqlite )
    #- ( [ -f "rcdb.sqlite" ] || wget -q https://clasweb.jlab.org/clas12offline/sqlite/rcdb/latest.sqlite -O rcdb.sqlite )
    - ( [ -f "rcdb.sqlite" ] || wget -q https://userweb.jlab.org/~whit/data_files/rcdb.sqlite -O rcdb.sqlite )
    - export PATH=/opt/coatjava/coatjava/bin:$PATH
    - source /opt/coatjava/coatjava/libexec/env.sh
    - export CCDB_CONNECTION="sqlite:///${PWD}/ccdb.sqlite"
    - export RCDB_CONNECTION="sqlite:///${PWD}/rcdb.sqlite"
  script:
    - echo "RUN_NUMBER = ${RUN_NUMBER}" 
    - echo "CLAS12DIR = ${CLAS12DIR}" 
    - echo "CCDB_CONNECTION = ${CCDB_CONNECTION}" 
    - echo "RCDB_CONNECTION = ${RCDB_CONNECTION}" 
    - ls -lrth
    - ls -lrth  ${LOCAL_DATA_DIR}
    - rm -f ${LOCAL_DATA_DIR}/reco_${RUN_NUMBER}.hipo
    - rm -f ${LOCAL_DATA_DIR}/reco2_${RUN_NUMBER}.hipo
    - >
      recon-util -y config/default.yml \
                 -i ${LOCAL_DATA_DIR}/alert_${RUN_NUMBER}.hipo \
                 -o ${LOCAL_DATA_DIR}/reco2_${RUN_NUMBER}.hipo 
    - >
      recon-util -i ${LOCAL_DATA_DIR}/reco2_${RUN_NUMBER}.hipo \
                 -o ${LOCAL_DATA_DIR}/reco_comics_${RUN_NUMBER}.hipo \
                 org.jlab.rec.service.ATOFTestEngine 
    - ls -lrth
  parallel:
    matrix:
      - RUN_NUMBER: [
                    #"20770","20777","20781","20821","20822","20823","20825", "20904",
                    # "21003", "21004",
                     #"21005","21009","21011","21019","21023",
                     #"21023", "21274"
                     "22188"
                    ]

