# Here we simply use the RDF hipo reader to convert the hipo file to root
# for subsequent analyses
alert_to_root:
  image: codecr.jlab.org/hallb/clas12/clas12-containers/hipo:latest
  needs: 
    - job: "reconstruction"
      parallel:
        matrix:
          - RUN_NUMBER: [
            #"20770","20777","20781","20821","20822","20823","20825", "20904",
            # "21003", "21004",
            #"21005","21009","21011","21019","21023",
            #"21023", "21274"
                     "22188"
            ]
  tags:
    - silicon-cached
  script:
    - ls -lrth
    - ls -lrth  ${LOCAL_DATA_DIR}
    - echo ${LOCAL_DATA_DIR}
    - root -b -q "alert_to_root.cxx+(\"${LOCAL_DATA_DIR}/alert_${RUN_NUMBER}.hipo\",\"${LOCAL_DATA_DIR}/alert_${RUN_NUMBER}.root\")"
    - root -b -q "alert_to_root.cxx+(\"${LOCAL_DATA_DIR}/reco2_${RUN_NUMBER}.hipo\",\"${LOCAL_DATA_DIR}/reco2_${RUN_NUMBER}.root\")"
    - root -b -q "alert_to_root.cxx+(\"${LOCAL_DATA_DIR}/reco_comics_${RUN_NUMBER}.hipo\",\"${LOCAL_DATA_DIR}/reco_comics_${RUN_NUMBER}.root\")"
    - ls -lrth
    - ls -lrth ${LOCAL_DATA_DIR}
  parallel:
    matrix:
      - RUN_NUMBER: [
        #"20770","20777","20781","20821","20822","20823","20825", "20904",
        # "21003", "21004",
        #"21005","21009","21011","21019","21023",
        #"21023", "21274"
        "22188"
        ]
  #artifacts:
  #  when: always
  #  paths:
  #   - ${LOCAL_DATA_DIR}/alert_${RUN_NUMBER}.root
  #    - reco2_${RUN_NUMBER}.root  # this is a test to see if using a yaml file produces the same thing
  #    - reco_comics_${RUN_NUMBER}.root # contains a tree for the cosmic test bank
  #  expire_in: 1 week

atof_analysis:
  image: codecr.jlab.org/hallb/clas12/clas12-containers/hipo:latest
  needs: 
    - job: "alert_to_root"
  tags:
    - silicon-cached
  script:
    - mkdir results
    - root -b -q "atof_tdcs.cxx(\"${LOCAL_DATA_DIR}/alert_${RUN_NUMBER}.root\")"
    - ls -lrth
  artifacts:
    when: always
    paths:
      - results/
    expire_in: 1 week
  parallel:
    matrix:
      - RUN_NUMBER: [
